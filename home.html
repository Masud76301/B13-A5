<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub | Home</title>
    <!-- Daisy UI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <header>
        <div class="flex justify-between navbar bg-base-100 shadow-sm px-[70px]">
            <div class="flex items-center">
                <img class="w-7" src="assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">

                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary">+New Issue</button>
            </div>
        </div>
    </header>

    <main class="mt-14 container mx-auto">
        <!-- Tab Section -->
        <section>
            <div id="tab-btn" class="bg-base-100 shadow-[0_1px_6px_rgba(0,0,0,0.20)] p-6 space-x-2 rounded-lg">
                <button onclick="selectBtn('allBtn')" id="allBtn" class="btn btn-primary text-[16px] w-[120px]">All</button>
                <button onclick="selectBtn('openBtn')" id="openBtn" class="btn text-[16px] w-[120px]">Open</button>
                <button onclick="selectBtn('closedBtn')" id="closedBtn" class="btn text-[16px] w-[120px]">Closed</button>
            </div>
        </section>

        <!-- Issues Section -->
        <section class="mt-4">

            <!-- Status Bar -->
            <div
                class="bg-base-100 shadow-[0_1px_6px_rgba(0,0,0,0.20)] p-6 rounded-t-lg flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img class="bg-[#ECE4FF] p-3 rounded-full" src="assets/Aperture.png" alt="">
                    <div>
                        <p class="text-[20px] font-semibold">50 Issues</p>
                        <p class="text-[16px] font-normal text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div class="bg-green-600 w-3 h-3 rounded-full"></div>
                    <span>Open</span>
                    <br>
                    <div class="bg-purple-600 w-3 h-3 rounded-full"></div>
                    <span>Closed</span>
                </div>
            </div>

            <!-- Issues Cards -->
            <div id="issue-cards"
                class="bg-[#FBFBFB] shadow-[0_1px_4px_rgba(0,0,0,0.25)] p-6 rounded-b-lg grid  grid-cols-1 sm:grid-cols-3 md:grid-cols-4 gap-4 ">

                <!-- card -->
                <div class="shadow-md rounded-lg border-t-3 border-t-green-500 ">

                    <div class="p-4 space-y-4">
                        <!-- Priority -->
                        <div class="flex items-center justify-between">
                            <img class="w-[24px]" src="assets/Closed- Status .png" alt="">
                            <h1
                                class="bg-error/10 text-red-500 w-[80px] h-[24px] text-[12px] p-1 text-center rounded-3xl">
                                HIGH</h1>
                        </div>

                        <!-- Card title and description -->
                        <div>
                            <h1 class=" mb-2 text-[14px] font-semibold">Fix Navigation Menu On Mobile Devices</h1>
                            <p class="text-[12px] font-normal text-[#64748B]">The navigation menu doesn't collapse
                                properly
                                on mobile devices</p>
                        </div>

                        <!-- labels -->
                        <div class="pb-5 mt-4 ">

                            <span
                                class="bg-error/10 text-red-500 border border-red-200 h-[24px] text-[12px] font-medium py-1 px-3 text-center rounded-3xl"><i
                                    class="fa-solid fa-bug mr-1"></i>BUG</span>

                            <span
                                class="bg-warning/10 text-yellow-600 border border-yellow-300 h-[24px] text-[12px] font-medium py-1 px-3 text-center rounded-3xl"><i
                                    class="fa-solid fa-bug mr-1"></i>HELP WANTED</span>

                        </div>

                    </div>

                    <!-- Author & Created At -->
                    <div class="text-[#64748B] text-[12px] space-y-2 border-t-2 border-t-gray-200 p-4">
                        <h1> <span>#1</span> by john_doe</h1>
                        <h1>1/15/2024</h1>
                    </div>
                </div>

                
            </div>

            <!-- Loading Spinner -->
                <div id="load-spinner" class="hidden justify-center ite">
                    <span class="loading loading-bars loading-xl"></span>
                </div>
        </section>
    </main>


    <script src="issue.js"></script>
</body>

</html>
